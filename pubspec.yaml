name: sound_effect
description: Play short audio clips with the lowest latency.
version: 0.2.0
repository: https://github.com/lichess-org/flutter-sound-effect

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_plugin_android_lifecycle: ^2.0.35
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: org.lichess.sound_effect
        pluginClass: SoundEffectPlugin
      ios:
        pluginClass: SoundEffectPlugin
